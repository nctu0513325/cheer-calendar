<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穎樂活動</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">

    <div class="socials">
      <a href="https://www.instagram.com/ninalin1231/" target="_blank" rel="noreferrer" class="igbtn">IG:ninalin1231</a>
      <a href="https://www.instagram.com/rakutengirls_nina/" target="_blank" rel="noreferrer" class="igbtn">IG:rakutengirls_nina</a>
