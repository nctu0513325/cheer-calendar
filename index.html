<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>啦啦隊活動月曆</title>
<style>
  :root{
    --bg:#EFEDE8; --card:#FBFAF7; --ink:#26231f;
    --muted:#8a857c; --line:#d8d4cb;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;
    padding:16px;
  }
  .wrap{max-width:860px;margin:0 auto}

  /* 標題 */
  .head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .eyebrow{font-size:12px;letter-spacing:.25em;color:var(--muted)}
  h1{margin:0;font-size:26px;font-weight:800;letter-spacing:.02em}

  /* 月份切換 */
  .monthbar{display:flex;align-items:center;gap:14px;margin-bottom:10px}
  .monthbar .label{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
  .navbtn{
    border:1.5px solid #c9c4ba;background:var(--card);border-radius:8px;
    width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--ink);
  }

  /* 月曆 */
  .weekdays,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .weekdays{margin-bottom:6px}
  .weekdays div{text-align:center;font-size:12px;font-weight:700;color:var(--muted);padding:4px 0}
  .weekdays div:first-child,.weekdays div:last-child{color:#A6002E}
  .cell{min-height:84px;background:var(--card);border-radius:10px;padding:6px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .cell.empty{background:transparent;box-shadow:none}
  .cell .num{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px}
  .cell.today .num{color:#fff;background:var(--ink);display:inline-block;border-radius:6px;padding:0 5px}
  .chip{
    display:block;width:100%;text-align:left;border:none;cursor:pointer;
    border-radius:5px;padding:3px 6px;font-size:11px;font-weight:700;line-height:1.3;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;
    font-family:inherit;
  }

  /* 圖例 */
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
  .legend span{display:flex;align-items:center;gap:5px;font-size:12px;color:#57534b}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}

  /* 詳情票根 */
  .overlay{
    position:fixed;inset:0;background:rgba(30,27,22,.5);
    display:none;align-items:center;justify-content:center;z-index:50;padding:12px;
  }
  .overlay.open{display:flex}
  .ticket{width:min(400px,92vw);background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.3)}
  .ticket .band{padding:16px 20px}
  .ticket .band .date{font-size:11px;letter-spacing:.2em;opacity:.85}
  .ticket .band .title{font-size:21px;font-weight:800}
  .ticket .tear{border-top:2px dashed var(--line);margin:0 14px}
  .ticket .body{padding:16px 20px;display:grid;gap:10px}
  .row{display:flex;gap:12px;font-size:14px}
  .row .k{width:40px;flex-shrink:0;color:var(--muted);font-weight:700}
  .row .v{font-weight:600}
  .mapbtn{
    margin-top:6px;display:block;text-align:center;text-decoration:none;
    background:var(--ink);color:#fff;border-radius:10px;padding:12px 0;
    font-size:15px;font-weight:800;
  }
  .closebtn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:6px;font-family:inherit}

  .hint{margin-top:20px;font-size:12px;color:var(--muted);line-height:1.7}
  code{background:#e5e1d8;border-radius:4px;padding:1px 5px;font-size:11px}

  @media (max-width:480px){
    .cell{min-height:64px;padding:4px}
    .chip{font-size:10px;padding:2px 4px}
    h1{font-size:22px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <div class="eyebrow">CHEER SCHEDULE</div>
      <h1>啦啦隊活動月曆</h1>
    </div>
  </div>

  <div class="monthbar">
    <button class="navbtn" id="prev">‹</button>
    <div class="label" id="monthLabel"></div>
    <button class="navbtn" id="next">›</button>
  </div>

  <div class="weekdays">
    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
  </div>
  <div class="grid" id="grid"></div>

  <div class="legend" id="legend"></div>

  <div class="hint">
    要新增或修改活動：編輯 repo 裡的 <code>events.json</code>，commit 後 push，網站約一分鐘內自動更新。
  </div>
</div>

<!-- 詳情票根 -->
<div class="overlay" id="overlay">
  <div class="ticket" id="ticket"></div>
</div>

<script>
// ── 球隊應援色 ──────────────────────────────
const TEAMS = {
  "樂天女孩":        { color:"#A6002E", text:"#fff" },
  "Passion Sisters": { color:"#F8C300", text:"#3a2e00" },
  "Fubon Angels":    { color:"#0072BC", text:"#fff" },
  "Dragon Beauties": { color:"#D6001C", text:"#fff" },
  "Uni Girls":       { color:"#F47920", text:"#fff" },
  "Wing Stars":      { color:"#00573F", text:"#fff" },
  "其他":            { color:"#6b6b6b", text:"#fff" }
};

// 找不到 events.json 時的備用範例（本機直接打開檔案時會看到這些）
const FALLBACK_EVENTS = [
  { date:"2026-07-04", team:"樂天女孩", title:"主場應援日", time:"17:05",
    venue:"樂天桃園棒球場", address:"桃園市中壢區領航北路一段1號",
    members:"琳妲、曲曲、菲菲", note:"賽前有應援教學快閃" },
  { date:"2026-07-11", team:"Fubon Angels", title:"新莊主場應援", time:"17:05",
    venue:"新莊棒球場", address:"新北市新莊區和興街66號",
    members:"慈妹、秀秀子", note:"" }
];

let events = [];
let year, month; // month 是 0-indexed

const WEEKDAYS = ["日","一","二","三","四","五","六"];
const pad = n => String(n).padStart(2,"0");
const keyOf = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const teamOf = e => TEAMS[e.team] || TEAMS["其他"];

function render(){
  document.getElementById("monthLabel").textContent = `${year} 年 ${month+1} 月`;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const startDow = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();
  const today = new Date();
  const isThisMonth = today.getFullYear()===year && today.getMonth()===month;

  for(let i=0;i<startDow;i++){
    const c=document.createElement("div");
    c.className="cell empty"; grid.appendChild(c);
  }
  for(let d=1;d<=days;d++){
    const c=document.createElement("div");
    c.className="cell"+(isThisMonth && today.getDate()===d ? " today":"");
    const num=document.createElement("div");
    num.className="num"; num.textContent=d; c.appendChild(num);

    events.filter(e=>e.date===keyOf(year,month,d)).forEach(e=>{
      const t=teamOf(e);
      const b=document.createElement("button");
      b.className="chip";
      b.style.background=t.color; b.style.color=t.text;
      b.textContent=e.team;
      b.onclick=()=>openTicket(e);
      c.appendChild(b);
    });
    grid.appendChild(c);
  }
}

function openTicket(e){
  const t=teamOf(e);
  const dow=WEEKDAYS[new Date(e.date+"T00:00:00").getDay()];
  const maps="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(e.address||e.venue);
  const rows=[
    ["時間", e.time||"未定"],
    ["地點", e.venue],
    ["地址", e.address],
    ["出勤", e.members],
    ["備註", e.note]
  ].filter(r=>r[1]);

  document.getElementById("ticket").innerHTML = `
    <div class="band" style="background:${t.color};color:${t.text}">
      <div class="date">${e.date}（${dow}）</div>
      <div class="title">${e.team}・${e.title}</div>
    </div>
    <div class="tear"></div>
    <div class="body">
      ${rows.map(r=>`<div class="row"><div class="k">${r[0]}</div><div class="v">${r[1]}</div></div>`).join("")}
      <a class="mapbtn" href="${maps}" target="_blank" rel="noreferrer">📍 在 Google Maps 開啟</a>
      <button class="closebtn" onclick="closeTicket()">關閉</button>
    </div>`;
  document.getElementById("overlay").classList.add("open");
}
function closeTicket(){ document.getElementById("overlay").classList.remove("open"); }
document.getElementById("overlay").addEventListener("click", ev=>{
  if(ev.target.id==="overlay") closeTicket();
});

function renderLegend(){
  const lg=document.getElementById("legend");
  lg.innerHTML=Object.entries(TEAMS)
    .filter(([n])=>n!=="其他")
    .map(([n,t])=>`<span><i class="dot" style="background:${t.color}"></i>${n}</span>`)
    .join("");
}

function nav(dir){
  month+=dir;
  if(month<0){month=11;year--;}
  if(month>11){month=0;year++;}
  render();
}
document.getElementById("prev").onclick=()=>nav(-1);
document.getElementById("next").onclick=()=>nav(1);

// ── 載入 events.json ─────────────────────────
async function init(){
  const now=new Date();
  year=now.getFullYear(); month=now.getMonth();
  try{
    const res=await fetch("events.json?t="+Date.now()); // 避免快取
    if(!res.ok) throw new Error();
    events=await res.json();
  }catch{
    events=FALLBACK_EVENTS; // 本機直接開檔案或還沒放 events.json 時
  }
  renderLegend();
  render();
}
init();
</script>
</body>
</html>
